<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Complaint | CivicDNA</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav>
        <div class="logo">CivicDNA</div>

        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="complaint.html">Report Complaint</a></li>
            <li><a href="dashboard.html">Dashboard</a></li>
        </ul>
    </nav>

    <section class="complaint-section">

        <div class="left-panel">
            <h1>Report a Civic Issue</h1>

            <p>
                Help us build smarter and cleaner cities.
                Your complaint can help CivicDNA discover
                hidden infrastructure problems.
            </p>

            <div class="info-box">
                🌱 Every complaint matters.
            </div>

            <div class="info-box">
                🤖 AI analyzes complaint patterns.
            </div>

            <div class="info-box">
                🎯 Root causes are identified faster.
            </div>
        </div>

        <div class="form-container">

            <form>

                <input type="text"
                placeholder="Enter Your Name">

                <input type="text"
                placeholder="Location">

                <select>
                    <option>Select Complaint Type</option>
                    <option>Pothole</option>
                    <option>Water Leakage</option>
                    <option>Garbage</option>
                    <option>Streetlight</option>
                    <option>Flooding</option>
                    <option>Road Damage</option>
                    <option>Other</option>
                </select>

                <textarea rows="5"
                placeholder="Describe the issue..."></textarea>

                <input type="file">

                <button type="submit">
                    Submit Complaint
                </button>

            </form>

        </div>

    </section>

</body>
</html>
